    namespace: applications-datastores-operations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Applications.Datastores Resource Management APIs — Operations. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: list-operations-provider
      description: List the operations for the provider
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: applications-datastores-operations.operationslist
      outputParameters:
      - type: object
        mapping: $.
