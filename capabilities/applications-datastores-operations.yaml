      name: providers-applications-datastores-operations
      description: REST surface for providers-Applications.Datastores-operations.
      operations:
      - method: GET
        name: operationslist
        description: List the operations for the provider
        call: applications-datastores-operations.operationslist
        outputParameters:
        - type: object
          mapping: $.
