naftiko: 1.0.0-alpha2
info:
  label: Applications.Datastores Resource Management APIs — Operations
  description: 'Applications.Datastores Resource Management APIs — Operations. 1 operations. Lead operation: Operations. Self-contained
    Naftiko capability covering one Radius business surface.'
  tags:
  - Radius
  - Operations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RADIUS_API_KEY: RADIUS_API_KEY
capability:
  consumes:
  - type: http
    namespace: applications-datastores-operations
    baseUri: https://management.azure.com
    description: Applications.Datastores Resource Management APIs — Operations business capability. Self-contained, no shared
      references.
    resources:
    - name: providers-Applications.Datastores-operations
      path: /providers/Applications.Datastores/operations
      operations:
      - name: operationslist
        method: GET
        description: List the operations for the provider
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
