naftiko: 1.0.0-alpha2
info:
  label: Universal Control Plane Resource Management APIs — Resources
  description: 'Universal Control Plane Resource Management APIs — Resources. 1 operations. Lead operation: Resources. Self-contained
    Naftiko capability covering one Radius business surface.'
  tags:
  - Radius
  - Resources
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RADIUS_API_KEY: RADIUS_API_KEY
capability:
  consumes:
  - type: http
    namespace: ucp-resources
    baseUri: https://management.azure.com
    description: Universal Control Plane Resource Management APIs — Resources business capability. Self-contained, no shared
      references.
    resources:
    - name: planes-radius-planeName-resourcegroups-resourceGroupName-resources
      path: /planes/radius/{planeName}/resourcegroups/{resourceGroupName}/resources
      operations:
      - name: resourceslist
        method: GET
        description: List resources in a resource group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: planeName
          in: path
          type: string
          description: The plane name.
          required: true
        - name: resourceGroupName
          in: path
          type: string
          description: The name of resource group
          required: true
  exposes:
  - type: rest
    namespace: ucp-resources-rest
    port: 8080
    description: REST adapter for Universal Control Plane Resource Management APIs — Resources. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/planes/radius/{planename}/resourcegroups/{resourcegroupname}/resources
      name: planes-radius-planename-resourcegroups-resourcegroupname-resources
      description: REST surface for planes-radius-planeName-resourcegroups-resourceGroupName-resources.
      operations:
      - method: GET
        name: resourceslist
        description: List resources in a resource group
        call: ucp-resources.resourceslist
        with:
          planeName: rest.planeName
          resourceGroupName: rest.resourceGroupName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ucp-resources-mcp
    port: 9090
    transport: http
    description: MCP adapter for Universal Control Plane Resource Management APIs — Resources. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: list-resources-resource-group
      description: List resources in a resource group
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ucp-resources.resourceslist
      with:
        planeName: tools.planeName
        resourceGroupName: tools.resourceGroupName
      outputParameters:
      - type: object
        mapping: $.
